<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>История</title>
<link rel="stylesheet" href="/static/styles.css">
</head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<body class="history-page">

<div class="container">

<h2>История</h2>

<div id="list"></div>

<button onclick="location.href='/app'">Назад</button>

</div>

<script>
async function load() {
    const res = await fetch("/history");
    const data = await res.json();

    list.innerHTML = data.map(item => `
        <div class="item">
            <img src="${item.image}">
            <div>
                <div>${item.result}</div>
                <div>${(item.probability*100).toFixed(1)}%</div>
            </div>
        </div>
    `).join("");
}

load();
</script>

</body>
</html>

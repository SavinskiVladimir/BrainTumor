<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Регистрация</title>
    <style>
        body { font-family:'Segoe UI'; background:linear-gradient(135deg,#667eea,#764ba2);
            display:flex; justify-content:center; align-items:center; height:100vh; }
        .container { background:white; padding:40px; border-radius:20px; width:300px; text-align:center; }
        input { width:100%; padding:10px; margin:10px 0; }
        button { width:100%; padding:10px; background:#764ba2; color:white; border:none; border-radius:10px; }
    </style>
</head>
<body>
<div class="container">
    <h2>Регистрация</h2>
    <input id="username" placeholder="Имя">
    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Пароль">
    <button onclick="register()">Создать</button>
    <p><a href="/login">Вход</a></p>
</div>

<script>
    async function register(){
        const username = document.getElementById("username").value;
        const email = document.getElementById("email").value;
        const password = document.getElementById("password").value;

        const res = await fetch("/api/register", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ username, email, password })
        });

        const data = await res.json();
        if (res.ok) {
            alert("Регистрация успешна! Войдите");
            window.location.href = "/login";
        } else {
            alert(data.error || "Ошибка регистрации");
        }
    }
</script>
</body>
</html>

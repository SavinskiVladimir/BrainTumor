<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Определение опухолей мозга</title>
    <style>
        /* Стили оставляем прежними */
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh; display:flex; flex-direction:column; align-items:center; padding:20px; }
        .container { background:white; border-radius:20px; box-shadow:0 20px 40px rgba(0,0,0,0.1);
            padding:40px; max-width:500px; width:100%; text-align:center; }
        h1 { color:#333; margin-bottom:30px; font-size:28px; }
        .upload-area { border:3px dashed #667eea; border-radius:15px; padding:40px; margin:20px 0; background:#f8f9ff; cursor:pointer; transition:all 0.3s ease; }
        .upload-area:hover { border-color:#764ba2; background:#f0f2ff; }
        #fileInput { display:none; }
        .upload-icon { font-size:48px; margin-bottom:15px; }
        .upload-text { color:#666; font-size:18px; margin-bottom:10px; }
        .upload-subtext { color:#999; font-size:14px; }
        #preview { max-width:300px; max-height:300px; border-radius:10px; margin:20px auto; display:none; object-fit:cover; }
        .button-group { display:flex; gap:15px; justify-content:center; margin-top:10px; flex-wrap:wrap; }
        button { padding:15px 30px; border:none; border-radius:50px; font-size:16px; font-weight:600; cursor:pointer; flex:1; max-width:220px; }
        #uploadBtn { background:linear-gradient(135deg, #667eea 0%, #764ba2 100%); color:white; }
        #gradcamBtn { background:linear-gradient(135deg,#ff6b6b,#ee5a24); color:white; }
        button:disabled { opacity:0.6; cursor:not-allowed; }
        .result { margin-top:30px; padding:25px; border-radius:15px; font-size:18px; font-weight:600;
            min-height:80px; display:flex; flex-direction:column; align-items:center; justify-content:center; }
        .result.healthy { background:#d4edda; color:#155724; border:2px solid #c3e6cb; }
        .result.tumor { background:#f8d7da; color:#721c24; border:2px solid #f5c6cb; }
        .result.loading { background:#fff3cd; color:#856404; border:2px solid #ffeaa7; }
        .probability { font-size:24px; margin-top:10px; font-weight:bold; }
        .gradcam-info { font-size:14px; color:#666; margin-top:10px; }
        #gradcamImage { max-width:100%; max-height:400px; border-radius:10px; margin-top:15px; display:none; }
    </style>
</head>
<body>
<div class="container">
    <h1>Определение опухолей мозга</h1>
    <div class="upload-area" onclick="document.getElementById('fileInput').click()">
        <div class="upload-icon">📁</div>
        <div class="upload-text">Нажмите или перетащите изображение</div>
        <div class="upload-subtext">JPG, PNG, TIF, TIFF</div>
    </div>
    <input type="file" id="fileInput" accept="image/*,.tif,.tiff">
    <img id="preview" alt="Предпросмотр">
    <div class="button-group">
        <button id="uploadBtn" onclick="uploadFile()" disabled>Быстрый анализ</button>
        <button id="gradcamBtn" onclick="uploadWithGradcam()" disabled>
            Анализ с построением карты признаков
        </button>
    </div>
    <div id="result" class="result"></div>
    <img id="gradcamImage" alt="Grad-CAM результат">
</div>

<script>
    const fileInput = document.getElementById('fileInput');
    const preview = document.getElementById('preview');
    const uploadBtn = document.getElementById('uploadBtn');
    const gradcamBtn = document.getElementById('gradcamBtn');
    const resultEl = document.getElementById('result');
    const gradcamImage = document.getElementById('gradcamImage');

    fileInput.addEventListener('change', function () {
        preview.style.display = 'none';
        preview.src = '';
        uploadBtn.disabled = gradcamBtn.disabled = true;
        if (!this.files?.[0]) return;
        const file = this.files[0];
        const reader = new FileReader();
        reader.onload = (e) => {
            preview.src = e.target.result;
            preview.style.display = 'block';
            uploadBtn.disabled = gradcamBtn.disabled = false;
        };
        reader.readAsDataURL(file);
    });

    async function uploadFile() {
        await sendRequest('/predict');
    }

    async function uploadWithGradcam() {
        await sendRequest('/predict_with_gradcam');
    }

    async function sendRequest(url) {
        const file = fileInput.files[0];
        const formData = new FormData();
        formData.append("file", file);
        try {
            const response = await fetch(url, { method: "POST", body: formData });
            const data = await response.json();
            if (!response.ok) {
                resultEl.innerText = "Ошибка: " + (data.error || "неизвестная ошибка");
                return;
            }
            resultEl.innerText = data.label + " (" + (data.tumor_probability*100).toFixed(1) + "%)";
            if (data.gradcam_image) {
                gradcamImage.src = data.gradcam_image;
                gradcamImage.style.display = 'block';
            }
        } catch (e) {
            resultEl.innerText = "Ошибка соединения с сервером";
        }
    }
</script>
</body>
</html>

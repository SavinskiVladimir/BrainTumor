<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Опухоли мозга</title>
<link rel="stylesheet" href="/static/styles.css">
</head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<body class="app-page">

<div class="container">

<h1>Определение опухолей мозга</h1>

<div class="upload-area" onclick="document.getElementById('fileInput').click()">
    📁 Нажмите или выберите изображение
</div>

<input type="file" id="fileInput" accept="image/*,.tif,.tiff">

<div class="button-group">
    <button id="uploadBtn" onclick="uploadFile()" disabled>Быстрый анализ</button>
    <button id="gradcamBtn" onclick="uploadWithGradcam()" disabled>Grad-CAM</button>
</div>

<div id="result" class="result"></div>

<!-- GRID ДЛЯ КАРТИНОК -->
<div class="image-grid">
    <img id="preview" style="display:none;">
    <img id="gradcamImage" style="display:none;">
</div>

</div>

<script>
const fileInput = document.getElementById('fileInput');
const preview = document.getElementById('preview');
const gradcamImage = document.getElementById('gradcamImage');
const uploadBtn = document.getElementById('uploadBtn');
const gradcamBtn = document.getElementById('gradcamBtn');
const resultEl = document.getElementById('result');

fileInput.addEventListener('change', () => {
    const file = fileInput.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = e => {
        preview.src = e.target.result;
        preview.style.display = 'block';
        uploadBtn.disabled = false;
        gradcamBtn.disabled = false;
    };
    reader.readAsDataURL(file);
});

async function send(url) {
    const form = new FormData();
    form.append("file", fileInput.files[0]);

    const res = await fetch(url, { method: "POST", body: form });
    const data = await res.json();

    resultEl.textContent = data.label + " (" + (data.tumor_probability*100).toFixed(1) + "%)";

    if (data.gradcam_image) {
        gradcamImage.src = data.gradcam_image + "?t=" + Date.now();
        gradcamImage.style.display = "block";
    }
}

function uploadFile() {
    send("/predict");
}

function uploadWithGradcam() {
    send("/predict_with_gradcam");
}
</script>

</body>
</html>
